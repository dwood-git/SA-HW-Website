<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled | BrookField Chase Tennis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-green: #1a3d2e;
            --grass-green: #2d5a3d;
            --white: #faf9f7;
            --text-dark: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Source Sans 3', sans-serif;
            color: var(--text-dark);
            background: var(--white);
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, var(--forest-green) 0%, var(--grass-green) 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            color: white;
            letter-spacing: 0.08em;
        }
        nav a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
        }
        .section {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--forest-green);
            letter-spacing: 0.05em;
            font-size: 3rem;
            margin-bottom: 1.25rem;
        }
        .cancel-box {
            background: rgba(122, 31, 31, 0.08);
            border: 1px solid rgba(122, 31, 31, 0.18);
            border-radius: 12px;
            padding: 1.5rem;
            font-weight: 650;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.25rem;
            color: #7a1f1f;
            font-weight: 700;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <div class="logo">BROOKFIELD CHASE TENNIS</div>
        <nav>
            <a href="/">Home</a>
        </nav>
    </header>

    <section class="section">
        <h1>Payment Cancelled</h1>
        <div class="cancel-box">
            You didn’t complete the $1 test purchase. No payment was captured.
        </div>
        <a class="back-link" href="/">Return to homepage</a>
    </section>
</body>
</html>
